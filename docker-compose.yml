services:
  db:
    image: postgres:15-alpine
    container_name: local_postgres_db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devdatabase
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdatabase"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: . # Builds from the solution root
      dockerfile: Dockerfile
    container_name: local_dotnet_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Overrides the connection string in appsettings.json to use the Docker network
      - ConnectionStrings__DefaultConnection=Host=db;Database=devdatabase;Username=devuser;Password=devpassword
    restart: unless-stopped

volumes:
  pgdata:
